version: 2
updates:

  # ── Quarkus platform BOM + all Maven dependencies ────────────────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    # Group all Quarkus platform upgrades (BOM + plugin) into a single PR so
    # the version numbers stay in sync and the diff is easy to review.
    groups:
      quarkus-platform:
        patterns:
          - "io.quarkus.platform:*"
          - "io.quarkus:*"
        update-types:
          - minor
          - patch
      quarkus-langchain4j:
        patterns:
          - "io.quarkiverse.langchain4j:*"
        update-types:
          - minor
          - patch
      test-toolchain:
        patterns:
          - "io.rest-assured:*"
          - "org.mockito:*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - java
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    ignore:
      # Major Quarkus bumps need manual review — they often contain breaking changes.
      - dependency-name: "io.quarkus.platform:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.quarkus:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.quarkiverse.langchain4j:*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions workflows ──────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
