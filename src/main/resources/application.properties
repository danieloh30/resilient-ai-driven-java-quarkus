# ============================================================
# OpenAI Configuration
# ============================================================
# Set your API key via environment variable: QUARKUS_LANGCHAIN4J_OPENAI_API_KEY
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.chat-model.max-completion-tokens=512
quarkus.langchain4j.openai.timeout=25S
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# ============================================================
# SmallRye Fault Tolerance — Metrics
# ============================================================
# quarkus.smallrye-fault-tolerance.metrics.enabled=true

# ============================================================
# Health
# ============================================================
quarkus.smallrye-health.root-path=/q/health

# ============================================================
# HTTP
# ============================================================
quarkus.http.port=8080

# ============================================================
# Logging
# ============================================================
quarkus.log.level=INFO
quarkus.log.category."org.acme".level=DEBUG
quarkus.log.category."dev.langchain4j".level=DEBUG

# ============================================================
# Dev mode — mock AI responses so no real API key needed
# ============================================================
%dev.quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
%dev.quarkus.langchain4j.devservices.enabled=false

# ============================================================
# Test mode
# ============================================================
%test.quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
%test.quarkus.langchain4j.devservices.enabled=false
